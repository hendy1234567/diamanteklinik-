<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Products Management</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { margin-bottom: 20px; }
        input { margin: 5px 0; padding: 5px; width: 200px; }
        button { padding: 5px 10px; cursor: pointer; }
        table { border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn-edit { background-color: #4CAF50; color: white; border: none; margin-right: 5px; }
        .btn-delete { background-color: #f44336; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Products Management</h1>

    <h3>Form Tambah Product</h3>
    <form id="productForm">
        <label>Nama:</label><br>
        <input type="text" id="name" required><br>
        
        <label>Kategori:</label><br>
        <input type="text" id="category" required><br>
        
        <label>Harga:</label><br>
        <input type="number" id="price" required><br>
        
        <button type="submit">Simpan</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="productTable">
        </tbody>
    </table>

    <script>
        const API_URL = 'http://localhost:2411/products';
        let editingId = null;

        async function loadProducts() {
            const response = await fetch(API_URL);
            const products = await response.json();
            const tableBody = document.getElementById('productTable');
            tableBody.innerHTML = '';

            products.forEach((product, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.category || '-'}</td>
                    <td>${product.price}</td>
                    <td>
                        <button class="btn-edit" onclick="editProduct(${product.id})">Edit</button>
                        <button class="btn-delete" onclick="deleteProduct(${product.id})">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const price = document.getElementById('price').value;

            if (editingId) {
                await fetch(`${API_URL}/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, category, price })
                });
                editingId = null;
            } else {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, category, price })
                });
            }

            document.getElementById('productForm').reset();
            loadProducts();
        });

        async function editProduct(id) {
            const response = await fetch(`${API_URL}/${id}`);
            const product = await response.json();
            document.getElementById('name').value = product.name;
            document.getElementById('category').value = product.category || '';
            document.getElementById('price').value = product.price;
            editingId = id;
        }

        async function deleteProduct(id) {
            if (confirm('Yakin ingin menghapus produk ini?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        loadProducts();
    </script>
</body>
</html>
